<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patent Figure Editor — InventorLab</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; display: flex; height: 100vh; overflow: hidden; }

  /* Toolbar */
  .toolbar { width: 240px; background: #16162a; border-right: 1px solid #2a2a4a; display: flex; flex-direction: column; flex-shrink: 0; }
  .toolbar h1 { font-size: 14px; padding: 16px; border-bottom: 1px solid #2a2a4a; color: #8888cc; font-weight: 600; letter-spacing: 0.5px; }
  .tool-section { padding: 12px 16px; border-bottom: 1px solid #2a2a4a; }
  .tool-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #6666aa; margin-bottom: 8px; }
  .tool-btn { display: block; width: 100%; padding: 8px 12px; margin-bottom: 4px; background: #22224a; border: 1px solid #3a3a5a; border-radius: 4px; color: #ccc; font-size: 12px; cursor: pointer; text-align: left; transition: all 0.15s; }
  .tool-btn:hover { background: #2a2a5a; border-color: #5555aa; }
  .tool-btn.active { background: #3a3a6a; border-color: #7777cc; color: #fff; }
  .tool-btn-row { display: flex; gap: 4px; margin-bottom: 4px; }
  .tool-btn-row .tool-btn { flex: 1; text-align: center; }

  /* Properties panel */
  .props { padding: 12px 16px; flex: 1; overflow-y: auto; }
  .props h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #6666aa; margin-bottom: 8px; }
  .prop-row { margin-bottom: 8px; }
  .prop-row label { display: block; font-size: 11px; color: #888; margin-bottom: 3px; }
  .prop-row input, .prop-row select { width: 100%; padding: 6px 8px; background: #22224a; border: 1px solid #3a3a5a; border-radius: 3px; color: #ddd; font-size: 12px; font-family: inherit; }
  .prop-row input:focus, .prop-row select:focus { outline: none; border-color: #7777cc; }

  /* Canvas area */
  .canvas-wrap { flex: 1; position: relative; overflow: hidden; background: #f5f5f5; }
  .canvas-wrap svg { position: absolute; top: 0; left: 0; }

  /* Status bar */
  .status { position: absolute; bottom: 0; left: 240px; right: 0; height: 28px; background: #16162a; border-top: 1px solid #2a2a4a; display: flex; align-items: center; padding: 0 12px; font-size: 11px; color: #666; gap: 16px; }
  .status .coord { color: #888; }

  /* Export actions */
  .actions { padding: 12px 16px; border-top: 1px solid #2a2a4a; }
  .actions .tool-btn { background: #2a3a5a; border-color: #4a5a8a; color: #aaccff; font-weight: 500; }
  .actions .tool-btn:hover { background: #3a4a6a; }
</style>
</head>
<body>

<div class="toolbar">
  <h1>Patent Figure Editor</h1>

  <div class="tool-section">
    <h3>Tools</h3>
    <div class="tool-btn-row">
      <button class="tool-btn active" id="tool-select" onclick="setTool('select')">Select</button>
      <button class="tool-btn" id="tool-box" onclick="setTool('box')">+ Box</button>
      <button class="tool-btn" id="tool-arrow" onclick="setTool('arrow')">+ Arrow</button>
    </div>
    <button class="tool-btn" id="tool-annotation" onclick="setTool('annotation')">+ Text</button>
    <button class="tool-btn" id="tool-line" onclick="setTool('line')">+ Line / Axis</button>
  </div>

  <div class="tool-section">
    <h3>Arrow Style</h3>
    <div class="tool-btn-row">
      <button class="tool-btn active" id="style-solid" onclick="setArrowStyle('solid')">Solid</button>
      <button class="tool-btn" id="style-dashed" onclick="setArrowStyle('dashed')">Dashed</button>
    </div>
    <div style="margin-top:4px;">
      <label style="font-size:11px;color:#888;display:flex;align-items:center;gap:6px;cursor:pointer;">
        <input type="checkbox" id="bidir-check"> Bidirectional
      </label>
    </div>
  </div>

  <div class="props" id="props-panel">
    <h3>Properties</h3>
    <p style="font-size:11px;color:#555;">Select an element to edit its properties.</p>
  </div>

  <div class="actions">
    <button class="tool-btn" onclick="exportSVG()">Export SVG</button>
    <button class="tool-btn" onclick="exportJSON()">Export JSON</button>
    <button class="tool-btn" onclick="importJSON()">Import JSON</button>
    <button class="tool-btn" onclick="clearAll()">Clear All</button>
  </div>
</div>

<div class="canvas-wrap" id="canvas-wrap">
  <svg id="canvas" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
    <defs>
      <marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#111"/></marker>
      <marker id="ah-s" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#111"/></marker>
      <marker id="ah-r" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto"><polygon points="10 0,0 3.5,10 7" fill="#111"/></marker>
      <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
        <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e0e0e8" stroke-width="0.5"/>
      </pattern>
    </defs>
    <rect width="10000" height="10000" x="-5000" y="-5000" fill="white"/>
    <rect width="10000" height="10000" x="-5000" y="-5000" fill="url(#grid)"/>
  </svg>
</div>

<div class="status">
  <span class="coord" id="status-coord">0, 0</span>
  <span id="status-zoom">100%</span>
  <span id="status-grid">Grid: ON</span>
  <span id="status-info">Click canvas to place elements | Scroll to zoom | Space+drag to pan | G to toggle grid</span>
</div>

<script>
var state = {
  tool: 'select',
  arrowStyle: 'solid',
  elements: [],    // { id, type:'box', label, numeral, x, y, w, h, style }
  arrows: [],      // { id, type:'arrow', fromId, toId, style, label, bidirectional }
  annotations: [], // { id, type:'annotation', text, x, y }
  lines: [],       // { id, type:'line', x1, y1, x2, y2, style }
  selected: null,
  dragging: null,
  dragOffset: null,
  arrowFrom: null, // element id when drawing an arrow
  lineStart: null, // {x,y} when drawing a line
  resizing: null,  // { id, edge, startX, startY, orig: {x,y,w,h} }
  nextId: 1,
};

// ── Undo/Redo ──
var undoStack = [];
var redoStack = [];
var MAX_UNDO = 50;

function saveUndoState() {
  undoStack.push(JSON.stringify({
    elements: state.elements,
    arrows: state.arrows,
    annotations: state.annotations,
    lines: state.lines,
    nextId: state.nextId,
  }));
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack = []; // clear redo on new action
}

function undo() {
  if (undoStack.length === 0) return;
  // Save current state to redo stack
  redoStack.push(JSON.stringify({
    elements: state.elements,
    arrows: state.arrows,
    annotations: state.annotations,
    lines: state.lines,
    nextId: state.nextId,
  }));
  var prev = JSON.parse(undoStack.pop());
  state.elements = prev.elements;
  state.arrows = prev.arrows;
  state.annotations = prev.annotations;
  state.lines = prev.lines;
  state.nextId = prev.nextId;
  state.selected = null;
  render();
  renderProps(null);
}

function redo() {
  if (redoStack.length === 0) return;
  undoStack.push(JSON.stringify({
    elements: state.elements,
    arrows: state.arrows,
    annotations: state.annotations,
    lines: state.lines,
    nextId: state.nextId,
  }));
  var next = JSON.parse(redoStack.pop());
  state.elements = next.elements;
  state.arrows = next.arrows;
  state.annotations = next.annotations;
  state.lines = next.lines;
  state.nextId = next.nextId;
  state.selected = null;
  render();
  renderProps(null);
}

// ── View state (zoom + pan) ──
var view = { x: 0, y: 0, zoom: 1 };
var GRID_SIZE = 20;
var SNAP = true;
var isPanning = false;
var panStart = null;
var spaceHeld = false;

var canvas = document.getElementById('canvas');
var canvasWrap = document.getElementById('canvas-wrap');

function genId() { return 'el_' + (state.nextId++); }

function snap(val) { return SNAP ? Math.round(val / GRID_SIZE) * GRID_SIZE : val; }
function snapPt(p) { return { x: snap(p.x), y: snap(p.y) }; }

// ── Resize canvas to fill container ──
function resizeCanvas() {
  var r = canvasWrap.getBoundingClientRect();
  canvas.setAttribute('width', r.width);
  canvas.setAttribute('height', r.height);
  updateViewBox();
}
function updateViewBox() {
  var r = canvasWrap.getBoundingClientRect();
  var w = r.width / view.zoom;
  var h = r.height / view.zoom;
  canvas.setAttribute('viewBox', view.x + ' ' + view.y + ' ' + w + ' ' + h);
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ── Tool selection ──
function setTool(t) {
  state.tool = t;
  state.arrowFrom = null;
  state.lineStart = null;
  document.querySelectorAll('#tool-select,#tool-box,#tool-arrow,#tool-annotation,#tool-line').forEach(function(b) { b.classList.remove('active'); });
  var btn = document.getElementById('tool-' + t);
  if (btn) btn.classList.add('active');
  document.getElementById('status-info').textContent =
    t === 'select' ? 'Click to select, drag to move' :
    t === 'box' ? 'Click canvas to place a box' :
    t === 'arrow' ? 'Click source box, then target box' :
    t === 'annotation' ? 'Click canvas to place text' :
    t === 'line' ? 'Click start point, then end point' : '';
}

function setArrowStyle(s) {
  state.arrowStyle = s;
  document.getElementById('style-solid').classList.toggle('active', s === 'solid');
  document.getElementById('style-dashed').classList.toggle('active', s === 'dashed');
}

// ── Canvas mouse events ──
function getCanvasPos(e) {
  var r = canvasWrap.getBoundingClientRect();
  var screenX = e.clientX - r.left;
  var screenY = e.clientY - r.top;
  // Convert screen coordinates to canvas coordinates (accounting for pan + zoom)
  return { x: Math.round(screenX / view.zoom + view.x), y: Math.round(screenY / view.zoom + view.y) };
}

// ── Resize edge detection ──
function edgeTolerance() { return 7 / view.zoom; }
var MIN_BOX_SIZE = 40;

function detectEdge(p, el) {
  if (!el || el.type !== 'box') return null;
  var left = el.x - el.w / 2, right = el.x + el.w / 2;
  var top = el.y - el.h / 2, bottom = el.y + el.h / 2;
  var inY = p.y >= top - edgeTolerance() && p.y <= bottom + edgeTolerance();
  var inX = p.x >= left - edgeTolerance() && p.x <= right + edgeTolerance();
  var edges = '';
  if (inX && Math.abs(p.y - top) < edgeTolerance()) edges += 'n';
  if (inX && Math.abs(p.y - bottom) < edgeTolerance()) edges += 's';
  if (inY && Math.abs(p.x - left) < edgeTolerance()) edges += 'w';
  if (inY && Math.abs(p.x - right) < edgeTolerance()) edges += 'e';
  // Corners
  if (edges === 'nw' || edges === 'wn') edges = 'nw';
  if (edges === 'ne' || edges === 'en') edges = 'ne';
  if (edges === 'sw' || edges === 'ws') edges = 'sw';
  if (edges === 'se' || edges === 'es') edges = 'se';
  return edges || null;
}

function edgeCursor(edge) {
  if (edge === 'n' || edge === 's') return 'ns-resize';
  if (edge === 'e' || edge === 'w') return 'ew-resize';
  if (edge === 'nw' || edge === 'se') return 'nwse-resize';
  if (edge === 'ne' || edge === 'sw') return 'nesw-resize';
  return 'default';
}

canvasWrap.addEventListener('mousemove', function(e) {
  var p = getCanvasPos(e);
  document.getElementById('status-coord').textContent = p.x + ', ' + p.y;

  // Active resize
  if (state.resizing) {
    var el = findById(state.resizing.id);
    if (el) {
      var edge = state.resizing.edge;
      var orig = state.resizing.orig;
      var dx = p.x - state.resizing.startX;
      var dy = p.y - state.resizing.startY;

      if (edge.includes('e')) { el.w = Math.max(MIN_BOX_SIZE, orig.w + dx); el.x = orig.x + dx / 2; }
      if (edge.includes('w')) { el.w = Math.max(MIN_BOX_SIZE, orig.w - dx); el.x = orig.x + dx / 2; }
      if (edge.includes('s')) { el.h = Math.max(MIN_BOX_SIZE, orig.h + dy); el.y = orig.y + dy / 2; }
      if (edge.includes('n')) { el.h = Math.max(MIN_BOX_SIZE, orig.h - dy); el.y = orig.y + dy / 2; }
      render();
      renderProps(el);
    }
    return;
  }

  // Active arrow endpoint drag — show preview
  if (state.endpointDrag) {
    // Just update cursor; actual reconnection happens on mouseup
    canvasWrap.style.cursor = 'crosshair';
    // Store current position for preview rendering
    state.endpointDrag.currentPos = [p.x, p.y];
    render();
    return;
  }

  // Active segment drag — move both endpoints of a segment along perpendicular axis
  if (state.segmentDrag) {
    var seg = state.segmentDrag;
    var dx = snap(p.x) - snap(seg.startPos.x);
    var dy = snap(p.y) - snap(seg.startPos.y);

    if (seg.arrowId) {
      var arr = findById(seg.arrowId);
      if (arr && arr.waypoints) {
        // segIndex is 1-based in the full point array; waypoint array is 0-based (offset by 1 since pts[0] is the anchor)
        var wpIdx1 = seg.segIndex - 1;
        var wpIdx2 = seg.segIndex;
        if (seg.isHorizontal) {
          // Horizontal segment → drag vertically
          if (wpIdx1 >= 0 && wpIdx1 < arr.waypoints.length) arr.waypoints[wpIdx1][1] = snap(arr.waypoints[wpIdx1][1] + dy);
          if (wpIdx2 >= 0 && wpIdx2 < arr.waypoints.length) arr.waypoints[wpIdx2][1] = snap(arr.waypoints[wpIdx2][1] + dy);
        } else {
          // Vertical segment → drag horizontally
          if (wpIdx1 >= 0 && wpIdx1 < arr.waypoints.length) arr.waypoints[wpIdx1][0] = snap(arr.waypoints[wpIdx1][0] + dx);
          if (wpIdx2 >= 0 && wpIdx2 < arr.waypoints.length) arr.waypoints[wpIdx2][0] = snap(arr.waypoints[wpIdx2][0] + dx);
        }
      }
    } else if (seg.lineId) {
      var ln = findById(seg.lineId);
      if (ln && ln.points) {
        var idx1 = seg.segIndex;
        var idx2 = seg.segIndex + 1;
        if (seg.isHorizontal) {
          if (idx1 >= 0 && idx1 < ln.points.length) ln.points[idx1][1] = snap(ln.points[idx1][1] + dy);
          if (idx2 >= 0 && idx2 < ln.points.length) ln.points[idx2][1] = snap(ln.points[idx2][1] + dy);
        } else {
          if (idx1 >= 0 && idx1 < ln.points.length) ln.points[idx1][0] = snap(ln.points[idx1][0] + dx);
          if (idx2 >= 0 && idx2 < ln.points.length) ln.points[idx2][0] = snap(ln.points[idx2][0] + dx);
        }
      }
    }
    seg.startPos = { x: p.x, y: p.y };
    render();
    return;
  }

  // Active waypoint drag
  if (state.waypointDrag) {
    var owner = findById(state.waypointDrag.ownerId);
    if (owner) {
      var sp = [snap(p.x), snap(p.y)];
      if (state.waypointDrag.type === 'arrow' && owner.waypoints) {
        owner.waypoints[state.waypointDrag.index] = sp;
      } else if (state.waypointDrag.type === 'line' && owner.points) {
        owner.points[state.waypointDrag.index] = sp;
      }
      render();
    }
    return;
  }

  // Active marquee selection — only activate after minimum drag distance
  if (state.marquee) {
    var mdx = Math.abs(p.x - state.marquee.startX);
    var mdy = Math.abs(p.y - state.marquee.startY);
    if (mdx > 10 || mdy > 10) {
      state.marquee.endX = p.x;
      state.marquee.endY = p.y;
      render();
    }
    return;
  }

  // Active label drag
  if (state.labelDrag) {
    var arr = findById(state.labelDrag.arrowId);
    if (arr) {
      var dx = p.x - state.labelDrag.startX;
      var dy = p.y - state.labelDrag.startY;
      arr.labelOffset = [state.labelDrag.origOffset[0] + dx, state.labelDrag.origOffset[1] + dy];
      render();
    }
    return;
  }

  // Active drag
  if (state.dragging && state.dragOffset) {
    var el = findById(state.dragging);
    if (el) {
      el.x = snap(p.x - state.dragOffset.x);
      el.y = snap(p.y - state.dragOffset.y);
      render();
    }
    return;
  }

  // Hover cursor: check for box edges, then segments
  if (state.tool === 'select') {
    var cursor = 'default';
    // Box edge resize cursor
    for (var i = state.elements.length - 1; i >= 0; i--) {
      var edge = detectEdge(p, state.elements[i]);
      if (edge) { cursor = edgeCursor(edge); break; }
    }
    // Arrow endpoint cursor (takes priority over resize)
    if (cursor === 'default' || cursor.includes('resize')) {
      var epHover = hitTestArrowEndpoint(p);
      if (epHover) cursor = 'crosshair';
    }
    // Segment drag cursor (if not already showing endpoint or edge cursor)
    if (cursor === 'default') {
      var segHover = hitTestSegment(p);
      if (segHover) {
        cursor = segHover.isHorizontal ? 'ns-resize' : 'ew-resize';
      }
    }
    canvasWrap.style.cursor = cursor;
  }
});

canvasWrap.addEventListener('mousedown', function(e) {
  if (e.target.closest('.toolbar')) return;
  if (isPanning || spaceHeld || e.button === 1) return; // pan handled separately
  var p = getCanvasPos(e);

  if (state.tool === 'select') {
    // Check for edge resize on boxes first
    var resizeTarget = null;
    var resizeEdge = null;
    for (var i = state.elements.length - 1; i >= 0; i--) {
      var edge = detectEdge(p, state.elements[i]);
      if (edge) { resizeTarget = state.elements[i]; resizeEdge = edge; break; }
    }

    // Check for arrow endpoint drag first
    var epHit = hitTestArrowEndpoint(p);
    var segHit = !epHit ? hitTestSegment(p) : null;
    var wpHit = (!epHit && !segHit) ? hitTestWaypoint(p) : null;

    if (epHit) {
      saveUndoState();
      selectElement(findById(epHit.arrowId));
      state.endpointDrag = epHit;
      canvasWrap.style.cursor = 'crosshair';
    } else if (segHit) {
      var owner = findById(segHit.arrowId || segHit.lineId);
      if (owner) selectElement(owner);
      saveUndoState();
      state.segmentDrag = segHit;
      state.segmentDrag.startPos = { x: p.x, y: p.y };
      canvasWrap.style.cursor = segHit.isHorizontal ? 'ns-resize' : 'ew-resize';

      // For arrows: convert auto-routed path to manual waypoints so we can drag them
      if (segHit.arrowId) {
        var arr = findById(segHit.arrowId);
        if (arr && (!arr.waypoints || arr.waypoints.length === 0)) {
          // Store the auto-routed intermediate points as manual waypoints
          var pts = segHit.allPts;
          arr.waypoints = [];
          for (var wi = 1; wi < pts.length - 1; wi++) {
            arr.waypoints.push([pts[wi][0], pts[wi][1]]);
          }
        }
      }
    } else if (wpHit) {
      saveUndoState();
      selectElement(findById(wpHit.ownerId));
      state.waypointDrag = wpHit;
    } else if (resizeTarget && resizeEdge) {
      saveUndoState();
      selectElement(resizeTarget);
      state.resizing = {
        id: resizeTarget.id,
        edge: resizeEdge,
        startX: p.x,
        startY: p.y,
        orig: { x: resizeTarget.x, y: resizeTarget.y, w: resizeTarget.w, h: resizeTarget.h },
      };
    } else {
      var hit = hitTest(p);
      if (hit) {
        selectElement(hit);
        // Only drag boxes and annotations (they have x,y)
        if (hit._hitLabel && hit.type === 'arrow') {
          // Dragging an arrow's label
          var labelArr = findById(hit.id);
          if (labelArr && labelArr._labelPos) {
            saveUndoState();
            state.labelDrag = { arrowId: hit.id, startX: p.x, startY: p.y, origOffset: labelArr.labelOffset ? [labelArr.labelOffset[0], labelArr.labelOffset[1]] : [0, 0] };
          }
        } else if (hit.type === 'box' || hit.type === 'annotation') {
          saveUndoState();
          state.dragging = hit.id;
          state.dragOffset = { x: p.x - hit.x, y: p.y - hit.y };
        }
      } else {
        // Empty space click — start marquee selection
        state.marquee = { startX: p.x, startY: p.y };
        state.multiSelect = [];
        selectElement(null);
      }
    }
  } else if (state.tool === 'box') {
    var sp = snapPt(p);
    var el = { id: genId(), type: 'box', label: 'Label', numeral: '', x: sp.x, y: sp.y, w: 160, h: 50, style: 'solid' };
    saveUndoState();
    state.elements.push(el);
    render();
    selectElement(el);
    setTool('select');
  } else if (state.tool === 'arrow') {
    var hit = hitTest(p);
    if (hit && hit.type === 'box') {
      if (!state.arrowFrom) {
        state.arrowFrom = hit.id;
        state.arrowWaypoints = [];
        document.getElementById('status-info').textContent = 'Click empty space for waypoints, or click target box to finish';
      } else if (state.arrowFrom !== hit.id) {
        var arr = {
          id: genId(), type: 'arrow',
          fromId: state.arrowFrom, toId: hit.id,
          waypoints: state.arrowWaypoints || [],
          style: state.arrowStyle, label: '',
          bidirectional: document.getElementById('bidir-check').checked,
        };
        saveUndoState();
        state.arrows.push(arr);
        state.arrowFrom = null;
        state.arrowWaypoints = [];
        render();
        selectElement(arr);
        setTool('select');
      }
    } else if (state.arrowFrom) {
      // Clicking empty space adds a waypoint
      if (!state.arrowWaypoints) state.arrowWaypoints = [];
      state.arrowWaypoints.push([snap(p.x), snap(p.y)]);
      render();
      // Draw in-progress waypoints
      document.getElementById('status-info').textContent = state.arrowWaypoints.length + ' waypoint(s) — click target box to finish, Esc to cancel';
    }
  } else if (state.tool === 'annotation') {
    var sp = snapPt(p);
    var ann = { id: genId(), type: 'annotation', text: 'Text', x: sp.x, y: sp.y, fontSize: 12, bold: false };
    saveUndoState();
    state.annotations.push(ann);
    render();
    selectElement(ann);
    setTool('select');
  } else if (state.tool === 'line') {
    if (!state.linePoints) {
      state.linePoints = [[snap(p.x), snap(p.y)]];
      document.getElementById('status-info').textContent = 'Click to add points, double-click to finish';
    } else {
      state.linePoints.push([snap(p.x), snap(p.y)]);
      render();
      document.getElementById('status-info').textContent = state.linePoints.length + ' points — double-click to finish';
    }
  }
});

canvasWrap.addEventListener('mouseup', function(e) {
  // Complete arrow endpoint reconnection
  if (state.endpointDrag) {
    var p = getCanvasPos(e);
    var arr = findById(state.endpointDrag.arrowId);
    if (arr) {
      // Check if released on a box
      var targetBox = null;
      for (var i = state.elements.length - 1; i >= 0; i--) {
        var el = state.elements[i];
        if (p.x >= el.x - el.w/2 && p.x <= el.x + el.w/2 && p.y >= el.y - el.h/2 && p.y <= el.y + el.h/2) {
          targetBox = el;
          break;
        }
      }
      if (targetBox) {
        // Find the nearest anchor point on the target box
        var allAnchors = ['top', 'top-left', 'top-right', 'bottom', 'bottom-left', 'bottom-right', 'left', 'left-top', 'left-bottom', 'right', 'right-top', 'right-bottom'];
        var bestAnchor = 'top';
        var bestDist = Infinity;
        for (var ai = 0; ai < allAnchors.length; ai++) {
          var ap = anchorPoint(targetBox, allAnchors[ai]);
          var d = Math.sqrt((p.x - ap[0]) * (p.x - ap[0]) + (p.y - ap[1]) * (p.y - ap[1]));
          if (d < bestDist) { bestDist = d; bestAnchor = allAnchors[ai]; }
        }
        if (state.endpointDrag.end === 'start') {
          arr.fromId = targetBox.id;
          arr.fromAnchor = bestAnchor;
        } else {
          arr.toId = targetBox.id;
          arr.toAnchor = bestAnchor;
        }

        // Fix orthogonality: ensure the segment between the nearest
        // waypoint and the new anchor is orthogonal by adjusting or
        // inserting a waypoint
        if (arr.waypoints && arr.waypoints.length > 0) {
          var newAnchorPt = anchorPoint(targetBox, bestAnchor);
          if (state.endpointDrag.end === 'end') {
            // Last waypoint → new end anchor must be orthogonal
            var lastWp = arr.waypoints[arr.waypoints.length - 1];
            if (lastWp[0] !== newAnchorPt[0] && lastWp[1] !== newAnchorPt[1]) {
              // Neither aligned — insert a corner waypoint
              // Go horizontal from last waypoint, then vertical to anchor
              arr.waypoints.push([snap(newAnchorPt[0]), snap(lastWp[1])]);
            }
          } else {
            // New start anchor → first waypoint must be orthogonal
            var firstWp = arr.waypoints[0];
            if (firstWp[0] !== newAnchorPt[0] && firstWp[1] !== newAnchorPt[1]) {
              // Insert a corner waypoint at the beginning
              arr.waypoints.unshift([snap(firstWp[0]), snap(newAnchorPt[1])]);
            }
          }
        }
      }
    }
    state.endpointDrag = null;
    canvasWrap.style.cursor = 'default';
    render();
  }

  // Complete marquee selection (only if it was actually dragged)
  if (state.marquee && !state.marquee.endX) {
    state.marquee = null; // click without drag — just clear
  }
  if (state.marquee && state.marquee.endX != null) {
    var mx1 = Math.min(state.marquee.startX, state.marquee.endX);
    var my1 = Math.min(state.marquee.startY, state.marquee.endY);
    var mx2 = Math.max(state.marquee.startX, state.marquee.endX);
    var my2 = Math.max(state.marquee.startY, state.marquee.endY);
    // Select all boxes and annotations within the rectangle
    var selected = [];
    state.elements.forEach(function(el) {
      if (el.x >= mx1 && el.x <= mx2 && el.y >= my1 && el.y <= my2) selected.push(el);
    });
    state.annotations.forEach(function(ann) {
      if (ann.x >= mx1 && ann.x <= mx2 && ann.y >= my1 && ann.y <= my2) selected.push(ann);
    });
    state.multiSelect = selected.map(function(el) { return el.id; });
    if (selected.length === 1) {
      selectElement(selected[0]);
    } else if (selected.length > 1) {
      state.selected = null;
      // Multi-select: set up for group drag
      state.multiDragReady = { ids: state.multiSelect, startX: state.marquee.endX, startY: state.marquee.endY };
    }
    state.marquee = null;
    render();
  }

  state.dragging = null;
  state.dragOffset = null;
  state.resizing = null;
  if (state.waypointDrag) {
    // Fix orthogonality after waypoint drag
    var wpOwner = findById(state.waypointDrag.ownerId);
    if (wpOwner && wpOwner.type === 'arrow' && wpOwner.waypoints) {
      fixArrowOrthogonality(wpOwner);
    }
  }
  state.waypointDrag = null;
  state.labelDrag = null;
  if (state.segmentDrag) {
    // After segment drag, fix orthogonality at anchor connections
    var seg = state.segmentDrag;
    if (seg.arrowId) {
      var arr = findById(seg.arrowId);
      if (arr && arr.waypoints && arr.waypoints.length > 0) {
        fixArrowOrthogonality(arr);
      }
    }
    state.segmentDrag = null;
    canvasWrap.style.cursor = 'default';
    render();
  }
});

canvasWrap.addEventListener('dblclick', function(e) {
  var p = getCanvasPos(e);
  // Finish line drawing
  if (state.tool === 'line' && state.linePoints && state.linePoints.length >= 2) {
    var ln = { id: genId(), type: 'line', points: state.linePoints, style: state.arrowStyle };
    saveUndoState();
    state.lines.push(ln);
    state.linePoints = null;
    render();
    selectElement(ln);
    setTool('select');
    return;
  }
  // Double-click a waypoint to delete it
  if (state.tool === 'select') {
    var wp = hitTestWaypoint(p);
    if (wp) {
      var owner = findById(wp.ownerId);
      if (owner && owner.type === 'arrow' && owner.waypoints) {
        owner.waypoints.splice(wp.index, 1);
        render();
      } else if (owner && owner.type === 'line' && owner.points && owner.points.length > 2) {
        owner.points.splice(wp.index, 1);
        render();
      }
    }
  }
});

// ── Hit testing ──
function pointToSegmentDist(px, py, x1, y1, x2, y2) {
  var dx = x2 - x1, dy = y2 - y1;
  var lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return Math.sqrt((px - x1) * (px - x1) + (py - y1) * (py - y1));
  var t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / lenSq));
  var projX = x1 + t * dx, projY = y1 + t * dy;
  return Math.sqrt((px - projX) * (px - projX) + (py - projY) * (py - projY));
}

function hitTest(p) {
  var HIT_DIST = 8 / view.zoom; // pixel tolerance for line/arrow hits, scaled with zoom

  // Check boxes first (reverse order = top first)
  for (var i = state.elements.length - 1; i >= 0; i--) {
    var el = state.elements[i];
    if (p.x >= el.x - el.w/2 && p.x <= el.x + el.w/2 && p.y >= el.y - el.h/2 && p.y <= el.y + el.h/2) return el;
  }
  // Check arrow labels
  for (var i = state.arrows.length - 1; i >= 0; i--) {
    var arr = state.arrows[i];
    if (arr.label && arr._labelPos) {
      var lp = arr._labelPos;
      var halfW = Math.max(30, arr.label.length * 3.5);
      if (Math.abs(p.x - lp[0]) < halfW && Math.abs(p.y - lp[1]) < 8) {
        return { id: arr.id, type: 'arrow', _hitLabel: true };
      }
    }
  }
  // Check annotations — hit area scales with font size and text length
  for (var i = state.annotations.length - 1; i >= 0; i--) {
    var a = state.annotations[i];
    var fs = a.fontSize || 10;
    var halfWidth = Math.max(40, (a.text || '').length * fs * 0.35);
    var halfHeight = fs * 0.8;
    if (Math.abs(p.x - a.x) < halfWidth && Math.abs(p.y - a.y) < halfHeight) return a;
  }
  // Check arrows (point-to-segment distance across all segments)
  for (var i = state.arrows.length - 1; i >= 0; i--) {
    var arr = state.arrows[i];
    var segs = getArrowSegments(arr);
    for (var j = 0; j < segs.length; j++) {
      if (pointToSegmentDist(p.x, p.y, segs[j][0], segs[j][1], segs[j][2], segs[j][3]) < HIT_DIST) return arr;
    }
  }
  // Check lines (point-to-segment distance across all segments)
  for (var i = state.lines.length - 1; i >= 0; i--) {
    var ln = state.lines[i];
    var pts = getLinePoints(ln);
    for (var j = 0; j < pts.length - 1; j++) {
      if (pointToSegmentDist(p.x, p.y, pts[j][0], pts[j][1], pts[j+1][0], pts[j+1][1]) < HIT_DIST) return ln;
    }
  }
  return null;
}

function getArrowAnchors(arr) {
  var fromEl = state.elements.find(function(e) { return e.id === arr.fromId; });
  var toEl = state.elements.find(function(e) { return e.id === arr.toId; });
  if (!fromEl || !toEl) return { fromEl: null, toEl: null, p1: null, p2: null };
  var auto = inferAnchor(fromEl, toEl);
  var fromDir = arr.fromAnchor || auto.from;
  var toDir = arr.toAnchor || auto.to;
  return { fromEl: fromEl, toEl: toEl, p1: anchorPoint(fromEl, fromDir), p2: anchorPoint(toEl, toDir) };
}

function getArrowSegments(arr) {
  var allPts = routeOrthogonal(arr);
  var segs = [];
  for (var i = 0; i < allPts.length - 1; i++) {
    segs.push([allPts[i][0], allPts[i][1], allPts[i+1][0], allPts[i+1][1]]);
  }
  return segs;
}

function getLinePoints(ln) {
  if (ln.points) return ln.points;
  return [[ln.x1, ln.y1], [ln.x2, ln.y2]];
}

function hitTestSegment(p) {
  var SEG_DIST = 8 / view.zoom;
  // Check arrows — find which segment of the routed path was clicked
  for (var i = state.arrows.length - 1; i >= 0; i--) {
    var arr = state.arrows[i];
    var pts = routeOrthogonal(arr);
    if (pts.length < 3) continue; // need at least 3 points to have a draggable middle segment
    // Skip first and last segments (those are anchored to boxes)
    for (var j = 1; j < pts.length - 2; j++) {
      var dist = pointToSegmentDist(p.x, p.y, pts[j][0], pts[j][1], pts[j+1][0], pts[j+1][1]);
      if (dist < SEG_DIST) {
        // Determine if horizontal or vertical segment
        var isHorizontal = Math.abs(pts[j][1] - pts[j+1][1]) < 2;
        return { arrowId: arr.id, segIndex: j, isHorizontal: isHorizontal, allPts: pts };
      }
    }
  }
  // Check lines
  for (var i = state.lines.length - 1; i >= 0; i--) {
    var ln = state.lines[i];
    var pts = getLinePoints(ln);
    if (pts.length < 3) continue;
    for (var j = 1; j < pts.length - 2; j++) {
      var dist = pointToSegmentDist(p.x, p.y, pts[j][0], pts[j][1], pts[j+1][0], pts[j+1][1]);
      if (dist < SEG_DIST) {
        var isHorizontal = Math.abs(pts[j][1] - pts[j+1][1]) < 2;
        return { lineId: ln.id, segIndex: j, isHorizontal: isHorizontal };
      }
    }
  }
  return null;
}

function hitTestArrowEndpoint(p) {
  // Only check selected arrow's endpoints — the diamond handles are only visible when selected
  var EP_RADIUS = 12 / view.zoom;
  for (var i = state.arrows.length - 1; i >= 0; i--) {
    var arr = state.arrows[i];
    if (arr.id !== state.selected) continue; // only selected arrows show endpoint handles
    var a = getArrowAnchors(arr);
    if (!a.p1) continue;
    if (Math.abs(p.x - a.p1[0]) < EP_RADIUS && Math.abs(p.y - a.p1[1]) < EP_RADIUS) {
      return { arrowId: arr.id, end: 'start' };
    }
    if (Math.abs(p.x - a.p2[0]) < EP_RADIUS && Math.abs(p.y - a.p2[1]) < EP_RADIUS) {
      return { arrowId: arr.id, end: 'end' };
    }
  }
  return null;
}

function hitTestWaypoint(p) {
  var WP_RADIUS = 8;
  // Check arrow waypoints
  for (var i = state.arrows.length - 1; i >= 0; i--) {
    var arr = state.arrows[i];
    if (!arr.waypoints) continue;
    for (var j = 0; j < arr.waypoints.length; j++) {
      var wp = arr.waypoints[j];
      if (Math.abs(p.x - wp[0]) < WP_RADIUS && Math.abs(p.y - wp[1]) < WP_RADIUS) {
        return { ownerId: arr.id, index: j, type: 'arrow' };
      }
    }
  }
  // Check line points (skip first and last — those are endpoints)
  for (var i = state.lines.length - 1; i >= 0; i--) {
    var ln = state.lines[i];
    if (!ln.points || ln.points.length <= 2) continue;
    for (var j = 1; j < ln.points.length - 1; j++) {
      var pt = ln.points[j];
      if (Math.abs(p.x - pt[0]) < WP_RADIUS && Math.abs(p.y - pt[1]) < WP_RADIUS) {
        return { ownerId: ln.id, index: j, type: 'line' };
      }
    }
  }
  return null;
}

function findById(id) {
  return state.elements.find(function(e) { return e.id === id; })
    || state.arrows.find(function(e) { return e.id === id; })
    || state.annotations.find(function(e) { return e.id === id; })
    || state.lines.find(function(e) { return e.id === id; });
}

// ── Selection & Properties ──
function selectElement(el) {
  state.selected = el ? el.id : null;
  render();
  renderProps(el);
}

function renderProps(el) {
  var panel = document.getElementById('props-panel');
  if (!el) {
    panel.innerHTML = '<h3>Properties</h3><p style="font-size:11px;color:#555;">Select an element to edit.</p>';
    return;
  }

  var html = '<h3>' + el.type.charAt(0).toUpperCase() + el.type.slice(1) + ' Properties</h3>';

  if (el.type === 'box') {
    html += propInput('Label', 'prop-label', el.label);
    html += propInput('Ref Numeral', 'prop-numeral', el.numeral);
    html += propInput('Width', 'prop-w', el.w);
    html += propInput('Height', 'prop-h', el.h);
    html += propSelect('Style', 'prop-style', el.style, ['solid', 'dashed']);
    html += '<div class="prop-row"><button class="tool-btn" onclick="deleteSelected()" style="color:#ff6666;border-color:#553333;">Delete</button></div>';
  } else if (el.type === 'arrow') {
    html += propInput('Label', 'prop-label', el.label);
    html += propSelect('Style', 'prop-style', el.style, ['solid', 'dashed']);
    var anchorOpts = ['auto', 'top', 'top-left', 'top-right', 'bottom', 'bottom-left', 'bottom-right', 'left', 'left-top', 'left-bottom', 'right', 'right-top', 'right-bottom'];
    html += propSelect('Source anchor', 'prop-fromAnchor', el.fromAnchor || 'auto', anchorOpts);
    html += propSelect('Target anchor', 'prop-toAnchor', el.toAnchor || 'auto', anchorOpts);
    html += '<div class="prop-row"><label style="font-size:11px;color:#888;display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="checkbox" id="prop-bidir"' + (el.bidirectional ? ' checked' : '') + ' onchange="updateProp(\'bidirectional\',this.checked)"> Bidirectional</label></div>';
    html += '<div class="prop-row"><button class="tool-btn" onclick="deleteSelected()" style="color:#ff6666;border-color:#553333;">Delete</button></div>';
  } else if (el.type === 'annotation') {
    html += propInput('Text', 'prop-text', el.text);
    html += propInput('Font Size', 'prop-fontSize', el.fontSize || 10);
    html += '<div class="prop-row"><label style="font-size:11px;color:#888;display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="checkbox" id="prop-bold"' + (el.bold ? ' checked' : '') + ' onchange="updateProp(\'bold\',this.checked)"> Bold</label></div>';
    html += '<div class="prop-row"><button class="tool-btn" onclick="deleteSelected()" style="color:#ff6666;border-color:#553333;">Delete</button></div>';
  } else if (el.type === 'line') {
    html += propSelect('Style', 'prop-style', el.style, ['solid', 'dashed']);
    html += '<div class="prop-row"><button class="tool-btn" onclick="deleteSelected()" style="color:#ff6666;border-color:#553333;">Delete</button></div>';
  }

  panel.innerHTML = html;

  // Bind change events
  var inputs = panel.querySelectorAll('input[data-prop], select[data-prop]');
  inputs.forEach(function(inp) {
    inp.addEventListener('input', function() {
      var prop = inp.getAttribute('data-prop');
      var val = inp.value;
      if (prop === 'w' || prop === 'h') val = parseInt(val) || 50;
      if (prop === 'fontSize') val = parseInt(val) || 10;
      updateProp(prop, val);
    });
  });
}

function propInput(label, id, value) {
  var prop = id.replace('prop-', '');
  return '<div class="prop-row"><label>' + label + '</label><input data-prop="' + prop + '" value="' + escHtml(String(value || '')) + '"></div>';
}

function propSelect(label, id, value, options) {
  var prop = id.replace('prop-', '');
  var opts = options.map(function(o) { return '<option value="' + o + '"' + (o === value ? ' selected' : '') + '>' + o + '</option>'; }).join('');
  return '<div class="prop-row"><label>' + label + '</label><select data-prop="' + prop + '">' + opts + '</select></div>';
}

function updateProp(prop, value) {
  var el = findById(state.selected);
  if (!el) return;
  saveUndoState();
  // "auto" anchor means remove the override
  if ((prop === 'fromAnchor' || prop === 'toAnchor') && value === 'auto') {
    delete el[prop];
  } else {
    el[prop] = value;
  }
  render();
}

function deleteSelected() {
  if (!state.selected) return;
  saveUndoState();
  var id = state.selected;
  state.elements = state.elements.filter(function(e) { return e.id !== id; });
  state.arrows = state.arrows.filter(function(e) { return e.id !== id && e.fromId !== id && e.toId !== id; });
  state.annotations = state.annotations.filter(function(e) { return e.id !== id; });
  state.lines = state.lines.filter(function(e) { return e.id !== id; });
  state.selected = null;
  render();
  renderProps(null);
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
  if ((e.key === 'Delete' || e.key === 'Backspace') && state.selected) { deleteSelected(); e.preventDefault(); }
  if (e.key === 'z' && (e.metaKey || e.ctrlKey) && !e.shiftKey) { e.preventDefault(); undo(); }
  if (e.key === 'z' && (e.metaKey || e.ctrlKey) && e.shiftKey) { e.preventDefault(); redo(); }
  if (e.key === 'y' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); redo(); }
  if (e.key === 'Escape') { state.arrowWaypoints = []; state.linePoints = null; setTool('select'); selectElement(null); render(); }
  if (e.key === 'b') setTool('box');
  if (e.key === 'a') setTool('arrow');
  if (e.key === 't') setTool('annotation');
  if (e.key === 'l') setTool('line');
  if (e.key === 'v') setTool('select');
  if (e.key === 'g') { SNAP = !SNAP; document.getElementById('status-grid').textContent = 'Grid: ' + (SNAP ? 'ON' : 'OFF'); }
  if (e.key === ' ') { spaceHeld = true; canvasWrap.style.cursor = 'grab'; e.preventDefault(); }
  // Zoom shortcuts
  if ((e.key === '=' || e.key === '+') && (e.metaKey || e.ctrlKey)) { e.preventDefault(); zoomAt(view.x + canvasWrap.offsetWidth / view.zoom / 2, view.y + canvasWrap.offsetHeight / view.zoom / 2, 1.2); }
  if (e.key === '-' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); zoomAt(view.x + canvasWrap.offsetWidth / view.zoom / 2, view.y + canvasWrap.offsetHeight / view.zoom / 2, 1 / 1.2); }
  if (e.key === '0' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); view.zoom = 1; view.x = 0; view.y = 0; updateViewBox(); render(); }
});
document.addEventListener('keyup', function(e) {
  if (e.key === ' ') { spaceHeld = false; canvasWrap.style.cursor = 'default'; }
});

// ── Zoom ──
function zoomAt(cx, cy, factor) {
  var newZoom = Math.max(0.2, Math.min(5, view.zoom * factor));
  // Zoom toward the cursor position
  view.x = cx - (cx - view.x) * (view.zoom / newZoom);
  view.y = cy - (cy - view.y) * (view.zoom / newZoom);
  view.zoom = newZoom;
  updateViewBox();
  render();
  document.getElementById('status-zoom').textContent = Math.round(view.zoom * 100) + '%';
}

canvasWrap.addEventListener('wheel', function(e) {
  e.preventDefault();
  var p = getCanvasPos(e);
  var factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
  zoomAt(p.x, p.y, factor);
}, { passive: false });

// ── Pan (space+drag or middle mouse) ──
canvasWrap.addEventListener('mousedown', function(e) {
  if (spaceHeld || e.button === 1) {
    isPanning = true;
    panStart = { x: e.clientX, y: e.clientY, vx: view.x, vy: view.y };
    canvasWrap.style.cursor = 'grabbing';
    e.preventDefault();
    return;
  }
}, true); // capture phase so it runs before the other mousedown

canvasWrap.addEventListener('mousemove', function(e) {
  if (isPanning && panStart) {
    var dx = (e.clientX - panStart.x) / view.zoom;
    var dy = (e.clientY - panStart.y) / view.zoom;
    view.x = panStart.vx - dx;
    view.y = panStart.vy - dy;
    updateViewBox();
    return;
  }
});

canvasWrap.addEventListener('mouseup', function(e) {
  if (isPanning) {
    isPanning = false;
    panStart = null;
    canvasWrap.style.cursor = spaceHeld ? 'grab' : 'default';
    return;
  }
});

// ── Render ──
function render() {
  // Keep defs and background, rebuild everything else
  var svg = canvas;
  // Remove all children except first three (defs + bg rect + grid rect)
  while (svg.children.length > 3) svg.removeChild(svg.lastChild);

  // Lines (polylines)
  state.lines.forEach(function(ln) {
    var pts = getLinePoints(ln);
    var isSelected = state.selected === ln.id;
    if (pts.length === 2) {
      var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', pts[0][0]); line.setAttribute('y1', pts[0][1]);
      line.setAttribute('x2', pts[1][0]); line.setAttribute('y2', pts[1][1]);
      line.setAttribute('stroke', isSelected ? '#4466cc' : '#111');
      line.setAttribute('stroke-width', '1');
      if (ln.style === 'dashed') line.setAttribute('stroke-dasharray', '6,4');
      svg.appendChild(line);
    } else {
      var polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
      polyline.setAttribute('points', pts.map(function(pt) { return pt[0] + ',' + pt[1]; }).join(' '));
      polyline.setAttribute('fill', 'none');
      polyline.setAttribute('stroke', isSelected ? '#4466cc' : '#111');
      polyline.setAttribute('stroke-width', '1');
      if (ln.style === 'dashed') polyline.setAttribute('stroke-dasharray', '6,4');
      svg.appendChild(polyline);
    }
    // Waypoint handles when selected
    if (isSelected && ln.points && ln.points.length > 2) {
      for (var j = 1; j < ln.points.length - 1; j++) {
        var c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        c.setAttribute('cx', ln.points[j][0]); c.setAttribute('cy', ln.points[j][1]);
        c.setAttribute('r', '4'); c.setAttribute('fill', '#4466cc'); c.setAttribute('stroke', 'white'); c.setAttribute('stroke-width', '1.5');
        svg.appendChild(c);
      }
    }
  });

  // Boxes
  state.elements.forEach(function(el) {
    var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    var x = el.x - el.w/2, y = el.y - el.h/2;

    var rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', x); rect.setAttribute('y', y);
    rect.setAttribute('width', el.w); rect.setAttribute('height', el.h);
    rect.setAttribute('rx', '0'); rect.setAttribute('fill', 'white');
    var isMultiSel = state.multiSelect && state.multiSelect.indexOf(el.id) >= 0;
    rect.setAttribute('stroke', (state.selected === el.id || isMultiSel) ? '#4466cc' : '#111');
    rect.setAttribute('stroke-width', state.selected === el.id ? '2' : '1.5');
    if (el.style === 'dashed') rect.setAttribute('stroke-dasharray', '5,3');
    g.appendChild(rect);

    var labelY = el.numeral ? el.y - 3 : el.y + 4;
    var label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', el.x); label.setAttribute('y', labelY);
    label.setAttribute('text-anchor', 'middle'); label.setAttribute('font-size', '11');
    label.setAttribute('font-weight', 'bold'); label.setAttribute('fill', '#111');
    label.textContent = el.label;
    g.appendChild(label);

    if (el.numeral) {
      var num = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      num.setAttribute('x', el.x); num.setAttribute('y', labelY + 16);
      num.setAttribute('text-anchor', 'middle'); num.setAttribute('font-size', '10');
      num.setAttribute('fill', '#555');
      num.textContent = el.numeral;
      g.appendChild(num);
    }

    svg.appendChild(g);
  });

  // Arrows (orthogonal routing with box avoidance)
  state.arrows.forEach(function(arr) {
    var allPts = routeOrthogonal(arr);
    if (allPts.length < 2) return;
    var isSelected = state.selected === arr.id;
    var marker = arr.style === 'dashed' ? 'ah-s' : 'ah';
    var sw = arr.style === 'dashed' ? '1' : '1.5';
    var dashAttr = arr.style === 'dashed' ? '5,3' : null;

    var polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
    polyline.setAttribute('points', allPts.map(function(pt) { return pt[0] + ',' + pt[1]; }).join(' '));
    polyline.setAttribute('fill', 'none');
    polyline.setAttribute('stroke', isSelected ? '#4466cc' : '#111');
    polyline.setAttribute('stroke-width', sw);
    if (dashAttr) polyline.setAttribute('stroke-dasharray', dashAttr);
    polyline.setAttribute('marker-end', 'url(#' + marker + ')');
    if (arr.bidirectional) polyline.setAttribute('marker-start', 'url(#ah-r)');
    svg.appendChild(polyline);

    // Waypoint handles when selected (manual waypoints only)
    var wps = arr.waypoints || [];
    if (isSelected && wps.length > 0) {
      for (var j = 0; j < wps.length; j++) {
        var c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        c.setAttribute('cx', wps[j][0]); c.setAttribute('cy', wps[j][1]);
        c.setAttribute('r', '4'); c.setAttribute('fill', '#4466cc'); c.setAttribute('stroke', 'white'); c.setAttribute('stroke-width', '1.5');
        svg.appendChild(c);
      }
    }
    // Endpoint handles when selected — diamond shapes at start/end for drag-to-reconnect
    if (isSelected) {
      var a = getArrowAnchors(arr);
      if (a.p1) {
        [a.p1, a.p2].forEach(function(pt) {
          var diamond = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
          var s = 6;
          diamond.setAttribute('points',
            (pt[0]) + ',' + (pt[1] - s) + ' ' +
            (pt[0] + s) + ',' + (pt[1]) + ' ' +
            (pt[0]) + ',' + (pt[1] + s) + ' ' +
            (pt[0] - s) + ',' + (pt[1])
          );
          diamond.setAttribute('fill', '#cc4466');
          diamond.setAttribute('stroke', 'white');
          diamond.setAttribute('stroke-width', '1.5');
          svg.appendChild(diamond);
        });
      }
    }

    if (arr.label) {
      // Place label at midpoint of the full path, offset by labelOffset if dragged
      var midIdx = Math.floor(allPts.length / 2);
      var midA = allPts[midIdx - 1] || allPts[0];
      var midB = allPts[midIdx];
      var lox = (arr.labelOffset ? arr.labelOffset[0] : 0);
      var loy = (arr.labelOffset ? arr.labelOffset[1] : 0);
      var mx = (midA[0] + midB[0]) / 2 + lox;
      var my = (midA[1] + midB[1]) / 2 - 10 + loy;
      arr._labelPos = [mx, my]; // store for hit testing
      var text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', mx); text.setAttribute('y', my);
      text.setAttribute('text-anchor', 'middle'); text.setAttribute('font-size', '9');
      text.setAttribute('fill', state.selected === arr.id ? '#4466cc' : '#777');
      text.setAttribute('font-style', 'italic');
      text.textContent = arr.label;
      svg.appendChild(text);
    }
  });

  // Annotations
  state.annotations.forEach(function(ann) {
    var text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', ann.x); text.setAttribute('y', ann.y);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('font-size', ann.fontSize || 10);
    if (ann.bold) text.setAttribute('font-weight', 'bold');
    text.setAttribute('fill', state.selected === ann.id ? '#4466cc' : '#111');
    text.textContent = ann.text;
    svg.appendChild(text);
  });

  // Endpoint drag preview — show anchor points on all boxes + snap
  if (state.endpointDrag && state.endpointDrag.currentPos) {
    var dragArr = findById(state.endpointDrag.arrowId);
    if (dragArr) {
      var a = getArrowAnchors(dragArr);
      if (a.p1) {
        var fixedPt = state.endpointDrag.end === 'start' ? a.p2 : a.p1;
        var dragPt = state.endpointDrag.currentPos;

        // Show anchor points on all boxes
        var allAnchorNames = ['top', 'top-left', 'top-right', 'bottom', 'bottom-left', 'bottom-right', 'left', 'left-top', 'left-bottom', 'right', 'right-top', 'right-bottom'];
        var snapDist = 15 / view.zoom;
        var snappedPt = dragPt;
        var bestSnapDist = Infinity;
        state.elements.forEach(function(el) {
          for (var ai = 0; ai < allAnchorNames.length; ai++) {
            var ap = anchorPoint(el, allAnchorNames[ai]);
            // Draw anchor dot
            var dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            dot.setAttribute('cx', ap[0]); dot.setAttribute('cy', ap[1]);
            dot.setAttribute('r', '3'); dot.setAttribute('fill', 'rgba(204,68,102,0.4)');
            dot.setAttribute('stroke', '#cc4466'); dot.setAttribute('stroke-width', '0.5');
            svg.appendChild(dot);
            // Check for snap
            var d = Math.sqrt((dragPt[0] - ap[0]) * (dragPt[0] - ap[0]) + (dragPt[1] - ap[1]) * (dragPt[1] - ap[1]));
            if (d < snapDist && d < bestSnapDist) {
              bestSnapDist = d;
              snappedPt = ap;
            }
          }
        });

        // Highlight snapped anchor
        if (snappedPt !== dragPt) {
          var snapHighlight = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          snapHighlight.setAttribute('cx', snappedPt[0]); snapHighlight.setAttribute('cy', snappedPt[1]);
          snapHighlight.setAttribute('r', '6'); snapHighlight.setAttribute('fill', 'rgba(204,68,102,0.3)');
          snapHighlight.setAttribute('stroke', '#cc4466'); snapHighlight.setAttribute('stroke-width', '2');
          svg.appendChild(snapHighlight);
        }

        var prev = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        prev.setAttribute('x1', fixedPt[0]); prev.setAttribute('y1', fixedPt[1]);
        prev.setAttribute('x2', snappedPt[0]); prev.setAttribute('y2', snappedPt[1]);
        prev.setAttribute('stroke', '#4466cc'); prev.setAttribute('stroke-width', '1.5');
        prev.setAttribute('stroke-dasharray', '6,4');
        prev.setAttribute('marker-end', 'url(#ah)');
        svg.appendChild(prev);
        // Draw a circle at cursor/snap point
        var circ = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circ.setAttribute('cx', snappedPt[0]); circ.setAttribute('cy', snappedPt[1]);
        circ.setAttribute('r', '5'); circ.setAttribute('fill', '#4466cc'); circ.setAttribute('opacity', '0.5');
        svg.appendChild(circ);
      }
    }
  }

  // In-progress arrow waypoints
  if (state.arrowFrom && state.arrowWaypoints && state.arrowWaypoints.length > 0) {
    var fromEl = state.elements.find(function(e) { return e.id === state.arrowFrom; });
    if (fromEl) {
      var pts = [anchorPoint(fromEl, 'right')].concat(state.arrowWaypoints);
      for (var j = 0; j < pts.length - 1; j++) {
        var l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        l.setAttribute('x1', pts[j][0]); l.setAttribute('y1', pts[j][1]);
        l.setAttribute('x2', pts[j+1][0]); l.setAttribute('y2', pts[j+1][1]);
        l.setAttribute('stroke', '#4466cc'); l.setAttribute('stroke-width', '1'); l.setAttribute('stroke-dasharray', '4,4');
        svg.appendChild(l);
      }
      for (var j = 0; j < state.arrowWaypoints.length; j++) {
        var c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        c.setAttribute('cx', state.arrowWaypoints[j][0]); c.setAttribute('cy', state.arrowWaypoints[j][1]);
        c.setAttribute('r', '3'); c.setAttribute('fill', '#4466cc');
        svg.appendChild(c);
      }
    }
  }

  // In-progress line points
  if (state.linePoints && state.linePoints.length > 0) {
    for (var j = 0; j < state.linePoints.length - 1; j++) {
      var l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      l.setAttribute('x1', state.linePoints[j][0]); l.setAttribute('y1', state.linePoints[j][1]);
      l.setAttribute('x2', state.linePoints[j+1][0]); l.setAttribute('y2', state.linePoints[j+1][1]);
      l.setAttribute('stroke', '#4466cc'); l.setAttribute('stroke-width', '1'); l.setAttribute('stroke-dasharray', '4,4');
      svg.appendChild(l);
    }
    for (var j = 0; j < state.linePoints.length; j++) {
      var c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      c.setAttribute('cx', state.linePoints[j][0]); c.setAttribute('cy', state.linePoints[j][1]);
      c.setAttribute('r', '3'); c.setAttribute('fill', '#4466cc');
      svg.appendChild(c);
    }
  }

  // Marquee selection rectangle
  if (state.marquee && state.marquee.endX != null) {
    var mx = Math.min(state.marquee.startX, state.marquee.endX);
    var my = Math.min(state.marquee.startY, state.marquee.endY);
    var mw = Math.abs(state.marquee.endX - state.marquee.startX);
    var mh = Math.abs(state.marquee.endY - state.marquee.startY);
    var rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', mx); rect.setAttribute('y', my);
    rect.setAttribute('width', mw); rect.setAttribute('height', mh);
    rect.setAttribute('fill', 'rgba(68,102,204,0.08)');
    rect.setAttribute('stroke', '#4466cc'); rect.setAttribute('stroke-width', '1');
    rect.setAttribute('stroke-dasharray', '4,3');
    svg.appendChild(rect);
  }
}

function inferAnchor(from, to) {
  var dx = to.x - from.x, dy = to.y - from.y;
  if (Math.abs(dx) > Math.abs(dy)) {
    return dx > 0 ? { from: 'right', to: 'left' } : { from: 'left', to: 'right' };
  } else {
    return dy > 0 ? { from: 'bottom', to: 'top' } : { from: 'top', to: 'bottom' };
  }
}

function anchorPoint(el, dir) {
  var qw = el.w / 4; // quarter width for 3-per-side
  var qh = el.h / 4; // quarter height for 3-per-side
  switch(dir) {
    // Top side: left, center, right
    case 'top':         return [el.x, el.y - el.h/2];
    case 'top-left':    return [el.x - qw, el.y - el.h/2];
    case 'top-right':   return [el.x + qw, el.y - el.h/2];
    // Bottom side: left, center, right
    case 'bottom':      return [el.x, el.y + el.h/2];
    case 'bottom-left': return [el.x - qw, el.y + el.h/2];
    case 'bottom-right':return [el.x + qw, el.y + el.h/2];
    // Left side: top, center, bottom
    case 'left':        return [el.x - el.w/2, el.y];
    case 'left-top':    return [el.x - el.w/2, el.y - qh];
    case 'left-bottom': return [el.x - el.w/2, el.y + qh];
    // Right side: top, center, bottom
    case 'right':       return [el.x + el.w/2, el.y];
    case 'right-top':   return [el.x + el.w/2, el.y - qh];
    case 'right-bottom':return [el.x + el.w/2, el.y + qh];
  }
  return [el.x, el.y];
}

function anchorDir(dir) {
  // Returns the outward direction vector for a given anchor
  switch(dir) {
    case 'top':    return [0, -1];
    case 'bottom': return [0,  1];
    case 'left':   return [-1, 0];
    case 'right':  return [1,  0];
  }
  return [0, 0];
}

// ── Orthogonal routing ──
var ROUTE_MARGIN = 20; // pixels to extend from anchor before turning
var BOX_MARGIN = 12;   // clearance around boxes

function boxRect(el) {
  return { x1: el.x - el.w/2 - BOX_MARGIN, y1: el.y - el.h/2 - BOX_MARGIN,
           x2: el.x + el.w/2 + BOX_MARGIN, y2: el.y + el.h/2 + BOX_MARGIN };
}

function segmentHitsBox(ax, ay, bx, by, box) {
  // Check if a horizontal or vertical segment crosses a box rect
  if (ax === bx) {
    // Vertical segment
    var minY = Math.min(ay, by), maxY = Math.max(ay, by);
    return ax > box.x1 && ax < box.x2 && maxY > box.y1 && minY < box.y2;
  } else {
    // Horizontal segment
    var minX = Math.min(ax, bx), maxX = Math.max(ax, bx);
    return ay > box.y1 && ay < box.y2 && maxX > box.x1 && minX < box.x2;
  }
}

function routeOrthogonal(arr) {
  var a = getArrowAnchors(arr);
  if (!a.p1) return [];

  // If arrow has manual waypoints, enforce orthogonality between all consecutive points
  if (arr.waypoints && arr.waypoints.length > 0) {
    var rawPts = [a.p1].concat(arr.waypoints).concat([a.p2]);
    var orthPts = [rawPts[0]];
    for (var oi = 1; oi < rawPts.length; oi++) {
      var prev = orthPts[orthPts.length - 1];
      var curr = rawPts[oi];
      // If not aligned horizontally or vertically, insert a corner
      if (Math.abs(prev[0] - curr[0]) > 1 && Math.abs(prev[1] - curr[1]) > 1) {
        // Go horizontal first, then vertical
        orthPts.push([curr[0], prev[1]]);
      }
      orthPts.push(curr);
    }
    return orthPts;
  }

  var p1 = a.p1, p2 = a.p2;
  var auto = inferAnchor(a.fromEl, a.toEl);
  var fromDir = arr.fromAnchor || auto.from;
  var toDir = arr.toAnchor || auto.to;
  var d1 = anchorDir(fromDir);
  var d2 = anchorDir(toDir);

  // Extension points: go outward from anchor by margin
  var ext1 = [p1[0] + d1[0] * ROUTE_MARGIN, p1[1] + d1[1] * ROUTE_MARGIN];
  var ext2 = [p2[0] + d2[0] * ROUTE_MARGIN, p2[1] + d2[1] * ROUTE_MARGIN];

  // Build candidate orthogonal paths
  var paths = [];

  // Horizontal anchors (left/right): go H, then V, then H
  if (d1[0] !== 0 && d2[0] !== 0) {
    var midX = (ext1[0] + ext2[0]) / 2;
    paths.push([p1, ext1, [midX, ext1[1]], [midX, ext2[1]], ext2, p2]);
    // Also try direct if aligned
    if (Math.abs(ext1[1] - ext2[1]) < 2) {
      paths.push([p1, ext1, ext2, p2]);
    }
  }
  // Vertical anchors (top/bottom): go V, then H, then V
  else if (d1[1] !== 0 && d2[1] !== 0) {
    var midY = (ext1[1] + ext2[1]) / 2;
    paths.push([p1, ext1, [ext1[0], midY], [ext2[0], midY], ext2, p2]);
    // Direct if aligned
    if (Math.abs(ext1[0] - ext2[0]) < 2) {
      paths.push([p1, ext1, ext2, p2]);
    }
  }
  // Mixed: one horizontal, one vertical — L-shape
  else {
    // Two L-shape options
    paths.push([p1, ext1, [ext2[0], ext1[1]], ext2, p2]);
    paths.push([p1, ext1, [ext1[0], ext2[1]], ext2, p2]);
  }

  // Pick the path with fewest box collisions
  var obstacles = state.elements.filter(function(el) {
    return el.id !== (a.fromEl && a.fromEl.id) && el.id !== (a.toEl && a.toEl.id);
  }).map(boxRect);

  var bestPath = paths[0];
  var bestCollisions = Infinity;

  for (var pi = 0; pi < paths.length; pi++) {
    var path = paths[pi];
    var collisions = 0;
    for (var si = 0; si < path.length - 1; si++) {
      for (var bi = 0; bi < obstacles.length; bi++) {
        if (segmentHitsBox(path[si][0], path[si][1], path[si+1][0], path[si+1][1], obstacles[bi])) {
          collisions++;
        }
      }
    }
    if (collisions < bestCollisions) {
      bestCollisions = collisions;
      bestPath = path;
    }
  }

  // If best path still has collisions, try to reroute the colliding segment
  if (bestCollisions > 0) {
    bestPath = rerouteAroundBoxes(bestPath, obstacles);
  }

  // Clean up: remove redundant collinear points
  return simplifyOrthogonal(bestPath);
}

function rerouteAroundBoxes(path, obstacles) {
  // For each segment that collides with a box, offset it around the box
  var result = [path[0]];
  for (var i = 0; i < path.length - 1; i++) {
    var ax = path[i][0], ay = path[i][1];
    var bx = path[i+1][0], by = path[i+1][1];
    var blocked = false;
    for (var bi = 0; bi < obstacles.length; bi++) {
      var box = obstacles[bi];
      if (segmentHitsBox(ax, ay, bx, by, box)) {
        // Route around: pick the closer side of the box
        if (ax === bx) {
          // Vertical segment blocked — jog horizontally around box
          var jogX = (ax < (box.x1 + box.x2) / 2) ? box.x1 : box.x2;
          result.push([jogX, ay]);
          result.push([jogX, by]);
        } else {
          // Horizontal segment blocked — jog vertically around box
          var jogY = (ay < (box.y1 + box.y2) / 2) ? box.y1 : box.y2;
          result.push([ax, jogY]);
          result.push([bx, jogY]);
        }
        blocked = true;
        break;
      }
    }
    if (!blocked) {
      result.push(path[i+1]);
    } else {
      result.push(path[i+1]);
    }
  }
  return result;
}

function fixArrowOrthogonality(arr) {
  // Ensure first waypoint is orthogonal to start anchor and last waypoint
  // is orthogonal to end anchor
  if (!arr.waypoints || arr.waypoints.length === 0) return;
  var a = getArrowAnchors(arr);
  if (!a.p1) return;

  var startPt = a.p1;
  var endPt = a.p2;
  var first = arr.waypoints[0];
  var last = arr.waypoints[arr.waypoints.length - 1];

  // Fix start → first waypoint orthogonality
  if (first[0] !== startPt[0] && first[1] !== startPt[1]) {
    // Diagonal — insert a corner. Extend from anchor direction first.
    var startDir = arr.fromAnchor || inferAnchor(a.fromEl, a.toEl).from;
    if (startDir.includes('top') || startDir.includes('bottom')) {
      // Vertical exit — go vertical to first wp's Y, then horizontal
      arr.waypoints.unshift([snap(startPt[0]), snap(first[1])]);
    } else {
      // Horizontal exit — go horizontal to first wp's X, then vertical
      arr.waypoints.unshift([snap(first[0]), snap(startPt[1])]);
    }
  }

  // Fix last waypoint → end orthogonality
  last = arr.waypoints[arr.waypoints.length - 1];
  if (last[0] !== endPt[0] && last[1] !== endPt[1]) {
    var endDir = arr.toAnchor || inferAnchor(a.fromEl, a.toEl).to;
    if (endDir.includes('top') || endDir.includes('bottom')) {
      // Vertical entry — come in vertically from last wp's X
      arr.waypoints.push([snap(endPt[0]), snap(last[1])]);
    } else {
      // Horizontal entry — come in horizontally from last wp's Y
      arr.waypoints.push([snap(last[0]), snap(endPt[1])]);
    }
  }
}

function simplifyOrthogonal(pts) {
  if (pts.length < 3) return pts;
  var result = [pts[0]];
  for (var i = 1; i < pts.length - 1; i++) {
    var prev = result[result.length - 1];
    var curr = pts[i];
    var next = pts[i + 1];
    // Skip if collinear (all same x or all same y)
    var sameX = Math.abs(prev[0] - curr[0]) < 1 && Math.abs(curr[0] - next[0]) < 1;
    var sameY = Math.abs(prev[1] - curr[1]) < 1 && Math.abs(curr[1] - next[1]) < 1;
    if (!sameX && !sameY) result.push(curr);
  }
  result.push(pts[pts.length - 1]);
  return result;
}

// ── Export ──
function exportSVG() {
  // Clone the canvas SVG and clean up selection highlights
  selectElement(null);
  render();
  var svgClone = canvas.cloneNode(true);
  svgClone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  var blob = new Blob([svgClone.outerHTML], { type: 'image/svg+xml' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'patent-figure.svg'; a.click();
  URL.revokeObjectURL(url);
}

function exportJSON() {
  var spec = {
    title: '',
    width: parseInt(canvas.getAttribute('width')),
    height: parseInt(canvas.getAttribute('height')),
    elements: state.elements.map(function(el) {
      var o = { id: el.numeral || undefined, label: el.label, position: [el.x, el.y], width: el.w, height: el.h };
      if (el.style === 'dashed') o.style = 'dashed';
      return o;
    }),
    arrows: state.arrows.map(function(arr) {
      var fromEl = state.elements.find(function(e) { return e.id === arr.fromId; });
      var toEl = state.elements.find(function(e) { return e.id === arr.toId; });
      var o = { from: fromEl?.numeral || arr.fromId, to: toEl?.numeral || arr.toId };
      if (arr.style !== 'solid') o.style = arr.style;
      if (arr.label) o.label = arr.label;
      if (arr.bidirectional) o.bidirectional = true;
      if (arr.waypoints && arr.waypoints.length) o.waypoints = arr.waypoints;
      if (arr.fromAnchor) o.fromAnchor = arr.fromAnchor;
      if (arr.toAnchor) o.toAnchor = arr.toAnchor;
      if (arr.labelOffset && (arr.labelOffset[0] !== 0 || arr.labelOffset[1] !== 0)) o.labelOffset = arr.labelOffset;
      return o;
    }),
    annotations: state.annotations.map(function(a) {
      var o = { text: a.text, position: [a.x, a.y] };
      if (a.fontSize && a.fontSize !== 10) o.fontSize = a.fontSize;
      if (a.bold) o.bold = true;
      return o;
    }),
    lines: state.lines.map(function(l) {
      if (l.points) {
        var o = { points: l.points };
        if (l.style === 'dashed') o.style = 'dashed';
        return o;
      }
      var o = { from: [l.x1, l.y1], to: [l.x2, l.y2] };
      if (l.style === 'dashed') o.style = 'dashed';
      return o;
    }),
  };
  var blob = new Blob([JSON.stringify(spec, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'patent-figure.json'; a.click();
  URL.revokeObjectURL(url);
}

function importJSON() {
  var input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = function() {
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var spec = JSON.parse(e.target.result);
        loadSpec(spec);
      } catch(err) { alert('Invalid JSON: ' + err.message); }
    };
    reader.readAsText(input.files[0]);
  };
  input.click();
}

function loadSpec(spec) {
  state.elements = [];
  state.arrows = [];
  state.annotations = [];
  state.lines = [];
  state.selected = null;
  state.nextId = 1;

  // Build id map for arrows
  var idMap = {};

  (spec.elements || []).forEach(function(el) {
    var id = genId();
    var numeral = el.id || '';
    idMap[numeral] = id;
    state.elements.push({
      id: id, type: 'box', label: el.label || '', numeral: numeral,
      x: el.position[0], y: el.position[1],
      w: el.width || 160, h: el.height || 50,
      style: el.style || 'solid',
    });
  });

  (spec.arrows || []).forEach(function(arr) {
    var fromId = idMap[arr.from] || arr.from;
    var toId = idMap[arr.to] || arr.to;
    var a = {
      id: genId(), type: 'arrow', fromId: fromId, toId: toId,
      waypoints: arr.waypoints || [],
      style: arr.style || 'solid', label: arr.label || '',
      bidirectional: arr.bidirectional || false,
    };
    if (arr.fromAnchor) a.fromAnchor = arr.fromAnchor;
    if (arr.toAnchor) a.toAnchor = arr.toAnchor;
    // Also check for anchors object (CLI format)
    if (arr.anchors) {
      if (arr.anchors.from) a.fromAnchor = arr.anchors.from;
      if (arr.anchors.to) a.toAnchor = arr.anchors.to;
    }
    if (arr.labelOffset) a.labelOffset = arr.labelOffset;
    state.arrows.push(a);
  });

  (spec.annotations || []).forEach(function(a) {
    state.annotations.push({
      id: genId(), type: 'annotation',
      text: Array.isArray(a.text) ? a.text.join(' ') : (a.text || ''),
      x: a.position[0], y: a.position[1],
      fontSize: a.fontSize || 10,
      bold: a.bold || false,
    });
  });

  (spec.lines || []).forEach(function(l) {
    if (l.points) {
      state.lines.push({
        id: genId(), type: 'line',
        points: l.points,
        style: l.style || 'solid',
      });
    } else {
      state.lines.push({
        id: genId(), type: 'line',
        points: [l.from, l.to],
        style: l.style || 'solid',
      });
    }
  });

  render();
  renderProps(null);
}

function clearAll() {
  if (!confirm('Clear everything?')) return;
  state.elements = []; state.arrows = []; state.annotations = []; state.lines = [];
  state.selected = null;
  render();
  renderProps(null);
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Initial render
render();

// Auto-load spec from ?file= URL parameter
(function() {
  var params = new URLSearchParams(window.location.search);
  var filePath = params.get('file');
  if (filePath) {
    fetch(filePath).then(function(r) { return r.json(); }).then(function(spec) {
      loadSpec(spec);
      document.getElementById('status-info').textContent = 'Loaded ' + filePath;
    }).catch(function(err) {
      document.getElementById('status-info').textContent = 'Failed to load ' + filePath;
    });
  }
})();
</script>
</body>
